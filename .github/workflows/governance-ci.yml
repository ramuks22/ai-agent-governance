name: Governance CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scan to diff against base

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Governance Check
        run: npm run governance:check

      - name: Pre-commit Gates (format, lint, secret scan)
        run: npm run gate:precommit

      - name: Pre-push Gates (tests, build)
        run: npm run gate:prepush
